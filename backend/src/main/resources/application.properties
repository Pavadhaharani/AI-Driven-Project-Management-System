spring.application.name=project-management-system

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/projectms

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=ProjectManagementSystemSecretKey2024VeryLongSecretKeyForSecurity
app.jwt.expiration=86400000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.projectms=DEBUG
logging.level.org.springframework.security=WARN